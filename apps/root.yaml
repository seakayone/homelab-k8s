apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: argocd
                  path: manifests/argocd
                - app: authentik
                  path: manifests/authentik
                - app: mealie
                  path: manifests/mealie
                - app: monitoring
                  path: manifests/monitoring
                - app: loki
                  path: manifests/loki
                - app: alloy
                  path: manifests/alloy
                - app: sealed-secrets
                  path: manifests/sealed-secrets
                - app: vikunja
                  path: manifests/vikunja
                - app: it-tools
                  path: manifests/it-tools
                - app: homepage
                  path: manifests/homepage
                - app: nfs-csi
                  path: manifests/nfs-csi
                - app: nfs-nas
                  path: manifests/nfs-nas
                - app: paperless
                  path: manifests/paperless
  template:
    metadata:
      name: "{{.app}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/seakayone/homelab-k8s.git
        targetRevision: main
        path: "{{.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.app}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
