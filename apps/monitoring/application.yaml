apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://forgejo.argocd.svc.cluster.local/christian/homelab-k8s.git
      targetRevision: main
      path: manifests/monitoring
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "69.x"
      helm:
        releaseName: kube-prometheus-stack
        values: |
          prometheus:
            prometheusSpec:
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
              retention: 10d
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: nfs
                    accessModes: [ReadWriteOnce]
                    resources:
                      requests:
                        storage: 5Gi

          grafana:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 100m
                memory: 256Mi
            ingress:
              enabled: false
            persistence:
              enabled: true
              storageClassName: nfs
              size: 2Gi
            additionalDataSources:
              - name: Loki
                type: loki
                url: http://loki.monitoring.svc.cluster.local:3100
                access: proxy
                isDefault: false

          alertmanager:
            alertmanagerSpec:
              storage: {}

          additionalServiceMonitors:
            - name: argocd-metrics
              namespace: argocd
              selector:
                matchLabels:
                  app.kubernetes.io/name: argocd-application-controller
              namespaceSelector:
                matchNames:
                  - argocd
              endpoints:
                - port: metrics
            - name: argocd-server-metrics
              namespace: argocd
              selector:
                matchLabels:
                  app.kubernetes.io/name: argocd-server
              namespaceSelector:
                matchNames:
                  - argocd
              endpoints:
                - port: metrics
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/enforce-version: latest
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
