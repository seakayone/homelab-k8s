apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: ""
  docker.yaml: ""
  proxmox.yaml: ""
  services.yaml: |
    - Homelab:
        - ArgoCD:
            href: https://argocd.lungfish-ide.ts.net
            description: GitOps continuous delivery
            icon: argo-cd.png
        - Grafana:
            href: https://grafana.lungfish-ide.ts.net
            description: Metrics and dashboards
            icon: grafana.png
        - Mealie:
            href: https://mealie.lungfish-ide.ts.net
            description: Recipe manager
            icon: mealie.png
        - Docmost:
            href: https://docmost.lungfish-ide.ts.net
            description: Wiki and documentation
            icon: docmost.png
  widgets.yaml: |
    - search:
        provider: duckduckgo
        target: _blank
