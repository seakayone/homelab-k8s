apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    background:
      image: https://images.unsplash.com/photo-1672288072591-619afe830096?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80
      opacity: 50
    theme: dark
    color: slate
    headerStyle: underlined
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: ""
  docker.yaml: ""
  proxmox.yaml: ""
  services.yaml: |
    - Homelab:
        - ArgoCD:
            href: https://argocd.lungfish-ide.ts.net
            description: GitOps continuous delivery
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/argo-cd.png
        - Grafana:
            href: https://grafana.lungfish-ide.ts.net
            description: Metrics and dashboards
            icon: grafana.png
        - Mealie:
            href: https://mealie.lungfish-ide.ts.net
            description: Recipe manager
            icon: mealie.png
        - Docmost:
            href: https://docmost.lungfish-ide.ts.net
            description: Wiki and documentation
            icon: docmost.png
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
    - openmeteo:
        label: Current
        latitude: 36.66
        longitude: -117.51
        units: metric
        cache: 5
