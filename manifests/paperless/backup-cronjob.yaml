---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup
  namespace: paperless
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup
  namespace: paperless
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["paperless-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup
  namespace: paperless
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup
subjects:
  - kind: ServiceAccount
    name: backup
    namespace: paperless
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: paperless-backup
  namespace: paperless
spec:
  schedule: "30 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:14
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  echo "Starting paperless backup ${STAMP}..."

                  pg_dump --host paperless-postgres --username paperless --dbname paperless \
                    | gzip > /backup/paperless-db-${STAMP}.sql.gz
                  echo "Database dump complete."

                  find /backup -name "paperless-db-*.sql.gz" -mtime +7 -delete
                  echo "Retention cleanup complete."
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: paperless-secrets
                      key: database-password
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  memory: 64Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: paperless-backup
