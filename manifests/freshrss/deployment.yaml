apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app: freshrss
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: freshrss
  template:
    metadata:
      labels:
        app: freshrss
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              set -eu
              chown -R 100:101 /data
              chmod -R u=rwX,g=rwX,o= /data
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
      containers:
        - name: freshrss
          image: freshrss/freshrss:1.28.1-alpine
          ports:
            - containerPort: 80
          env:
            - name: TZ
              value: Europe/Zurich
            - name: CRON_MIN
              value: "13,43"
          volumeMounts:
            - name: data
              mountPath: /var/www/FreshRSS/data
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: freshrss-data
