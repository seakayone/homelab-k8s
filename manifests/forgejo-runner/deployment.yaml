apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo-runner
  labels:
    app: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: runner
          image: data.forgejo.org/forgejo/runner:11
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/.runner ]; then
                forgejo-runner register --no-interactive \
                  --instance "$FORGEJO_URL" \
                  --token "$RUNNER_TOKEN" \
                  --name forgejo-runner \
                  --labels docker:docker://node:22-bookworm,ubuntu-latest:docker://node:22-bookworm,docker-builder:docker://docker:27
              fi
              forgejo-runner daemon
          env:
            - name: FORGEJO_URL
              value: http://forgejo.forgejo.svc.cluster.local:3000
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-secrets
                  key: runner-token
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
        - name: docker-in-docker
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-data
              mountPath: /var/lib/docker
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-runner-data
        - name: docker-data
          emptyDir: {}
