apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - operator.yaml
  - authproxy-rbac.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: operator-oauth
    namespace: tailscale
    behavior: replace
    envs:
      - operator-oauth.env

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: operator
        namespace: tailscale
      spec:
        template:
          spec:
            containers:
              - name: operator
                env:
                  - name: APISERVER_PROXY
                    value: "true"
