---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mealie-backup
  namespace: mealie
spec:
  schedule: "30 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 911
            runAsGroup: 911
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: alpine:3.21
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  echo "Starting mealie backup ${STAMP}..."

                  tar czf /backup/mealie-data-${STAMP}.tar.gz -C /data .
                  echo "Data backup complete."

                  find /backup -name "mealie-data-*.tar.gz" -mtime +7 -delete
                  echo "Retention cleanup complete."
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  memory: 64Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: mealie-data
            - name: backup
              persistentVolumeClaim:
                claimName: mealie-backup
