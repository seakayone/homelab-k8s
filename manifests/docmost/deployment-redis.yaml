apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost-redis
  namespace: docmost
  labels:
    app: docmost-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docmost-redis
  template:
    metadata:
      labels:
        app: docmost-redis
    spec:
      containers:
        - name: redis
          image: redis:8
          command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: docmost-redis-data
