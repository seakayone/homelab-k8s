apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost-db
  namespace: docmost
  labels:
    app: docmost-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docmost-db
  template:
    metadata:
      labels:
        app: docmost-db
    spec:
      containers:
        - name: postgres
          image: postgres:18
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: docmost
            - name: POSTGRES_USER
              value: docmost
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docmost-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: docmost-db-data
