apiVersion: v1
kind: Service
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app: forgejo
spec:
  selector:
    app: forgejo
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-ssh
  namespace: forgejo
  labels:
    app: forgejo
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: forgejo-ssh
spec:
  selector:
    app: forgejo
  ports:
    - port: 22
      targetPort: 2222
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-postgres
  namespace: forgejo
  labels:
    app: forgejo-postgres
spec:
  selector:
    app: forgejo-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
