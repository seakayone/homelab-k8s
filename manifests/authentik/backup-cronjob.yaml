---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup
  namespace: authentik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup
  namespace: authentik
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["authentik-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup
  namespace: authentik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup
subjects:
  - kind: ServiceAccount
    name: backup
    namespace: authentik
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: authentik-backup
  namespace: authentik
spec:
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  echo "Starting authentik backup ${STAMP}..."

                  pg_dump --host authentik-postgres --username authentik --dbname authentik \
                    | gzip > /backup/authentik-db-${STAMP}.sql.gz
                  echo "Database dump complete."

                  find /backup -name "authentik-db-*.sql.gz" -mtime +7 -delete
                  echo "Retention cleanup complete."
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: authentik-secrets
                      key: database-password
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  memory: 64Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: authentik-backup
