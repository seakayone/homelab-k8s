apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik
  namespace: authentik
  annotations:
    tailscale.com/funnel: "false"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Authentik
    gethomepage.dev/description: Identity provider and SSO
    gethomepage.dev/group: Infrastructure
    gethomepage.dev/icon: authentik.png
    gethomepage.dev/href: https://authentik.lungfish-ide.ts.net
    gethomepage.dev/app: authentik-server
    gethomepage.dev/pod-selector: app=authentik-server
spec:
  ingressClassName: tailscale
  rules:
    - host: authentik
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik
                port:
                  number: 9000
  tls:
    - hosts:
        - authentik
