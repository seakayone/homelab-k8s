            - -c
            - until pg_isready -h authentik-postgres -U authentik -d authentik; do sleep 2; done
      containers:
        - name: worker
          image: ghcr.io/goauthentik/server:2024.12.3
          args:
            - worker
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
