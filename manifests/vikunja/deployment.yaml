apiVersion: apps/v1
kind: Deployment
metadata:
  name: vikunja
  namespace: vikunja
  labels:
    app: vikunja
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vikunja
  template:
    metadata:
      labels:
        app: vikunja
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: wait-for-postgres
          image: postgres:18
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: vikunja-secrets
                  key: database-password
          command:
            - sh
            - -c
            - until pg_isready -h vikunja-postgres -U vikunja -d vikunja; do sleep 2; done
      containers:
        - name: vikunja
          image: vikunja/vikunja:2.2.2
          ports:
            - containerPort: 3456
          env:
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: VIKUNJA_SERVICE_PUBLICURL
              value: https://vikunja.lungfish-ide.ts.net
            - name: VIKUNJA_DATABASE_HOST
              value: vikunja-postgres
            - name: VIKUNJA_DATABASE_TYPE
              value: postgres
            - name: VIKUNJA_DATABASE_USER
              value: vikunja
            - name: VIKUNJA_DATABASE_DATABASE
              value: vikunja
            - name: VIKUNJA_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vikunja-secrets
                  key: database-password
            - name: VIKUNJA_SERVICE_JWTSECRET
              valueFrom:
                secretKeyRef:
                  name: vikunja-secrets
                  key: jwt-secret
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: files
              mountPath: /app/vikunja/files
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            tcpSocket:
              port: 3456
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3456
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: vikunja-files
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vikunja-postgres
  namespace: vikunja
  labels:
    app: vikunja-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vikunja-postgres
  template:
    metadata:
      labels:
        app: vikunja-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              value: vikunja
            - name: POSTGRES_USER
              value: vikunja
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vikunja-secrets
                  key: database-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - vikunja
                - -d
                - vikunja
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - vikunja
                - -d
                - vikunja
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vikunja-postgres-data
