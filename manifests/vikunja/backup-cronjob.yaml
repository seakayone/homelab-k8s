---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup
  namespace: vikunja
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup
  namespace: vikunja
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vikunja-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup
  namespace: vikunja
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup
subjects:
  - kind: ServiceAccount
    name: backup
    namespace: vikunja
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vikunja-backup
  namespace: vikunja
spec:
  schedule: "15 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:18
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  echo "Starting vikunja backup ${STAMP}..."

                  pg_dump --host vikunja-postgres --username vikunja --dbname vikunja \
                    | gzip > /backup/vikunja-db-${STAMP}.sql.gz
                  echo "Database dump complete."
                  find /backup -name "vikunja-db-*.sql.gz" -mtime +7 -delete

                  tar czf /backup/vikunja-files-${STAMP}.tar.gz -C /files .
                  echo "Files backup complete."
                  find /backup -name "vikunja-files-*.tar.gz" -mtime +7 -delete

                  echo "Retention cleanup complete."
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: vikunja-secrets
                      key: database-password
              volumeMounts:
                - name: files
                  mountPath: /files
                  readOnly: true
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  memory: 64Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
          volumes:
            - name: files
              persistentVolumeClaim:
                claimName: vikunja-files
            - name: backup
              persistentVolumeClaim:
                claimName: vikunja-backup
